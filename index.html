<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 학교 분실물 찾기</title>

<!-- =========================================================
  STYLES
========================================================= -->
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:          #f3f4f8;
  --white:       #ffffff;
  --text-dark:   #18202e;
  --text-mid:    #4a5568;
  --text-light:  #8a97aa;
  --accent:      #2558d4;
  --accent-soft: #edf2ff;
  --border:      #dde3ee;
  --shadow-sm:   0 2px 6px rgba(0,0,0,0.06);
  --shadow-md:   0 4px 18px rgba(0,0,0,0.09);
  --r:           14px;

  --type-lost-clr:  #dc2626; --type-lost-bg:  #fee2e2;
  --type-found-clr: #16a34a; --type-found-bg: #dcfce7;

  --status-open-clr:     var(--accent); --status-open-bg:     var(--accent-soft);
  --status-resolved-clr: #64748b;       --status-resolved-bg: #f1f5f9;
}

body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.page { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 24px 16px 100px; }

:focus { outline: none; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

/* ── 히어로 배너 ── */
.hero-banner {
  width: 100%; max-width: 520px;
  background: linear-gradient(140deg, #0f172a 0%, #1a2e50 60%, #0f2240 100%);
  border-radius: 20px; padding: 28px 24px 22px;
  margin-bottom: 14px; color: white;
  animation: heroIn .45s cubic-bezier(.22,1,.36,1);
  box-shadow: 0 10px 40px rgba(15,23,42,.32);
  position: relative; overflow: hidden;
}
.hero-banner::after {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(37,88,212,.35) 0%, transparent 70%);
  pointer-events: none;
}
.brand-bar {
  width: 100%; max-width: 520px; display: flex; align-items: center;
  gap: 8px; margin-bottom: 16px;
}
.brand-bar .brand-logo {
  width: 26px; height: 26px; border-radius: 8px;
  background: linear-gradient(140deg, var(--accent), #60a5fa);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: white;
}
.brand-bar .brand-name {
  font-size: 14px; font-weight: 800; color: var(--text-dark); letter-spacing: -.3px;
}
.brand-bar .brand-name span { color: var(--accent); }
.hero-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: #64748b; text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.hero-eyebrow .by-initium {
  background: rgba(96,165,250,.18); color: #93c5fd;
  padding: 2px 7px; border-radius: 20px; font-size: 9px; letter-spacing: .5px;
}
.hero-title {
  font-size: 30px; font-weight: 900; line-height: 1.15; letter-spacing: -1.5px;
  margin-bottom: 14px;
}
.hero-accent { color: #60a5fa; display: block; }
.hero-desc { font-size: 12px; color: #94a3b8; line-height: 1.7; }

/* ── 푸터 ── */
.app-footer {
  width: 100%; max-width: 520px; display: flex; flex-direction: column;
  align-items: center; gap: 10px; padding: 28px 16px; margin-top: 32px;
  border-top: 1px solid var(--border);
}
.app-footer .footer-logo {
  width: 30px; height: 30px; border-radius: 9px;
  background: linear-gradient(140deg, var(--accent), #60a5fa);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: white;
}
.app-footer .footer-text { font-size: 12px; color: var(--text-light); }
.app-footer .footer-text span { color: #ef4444; }
.app-footer .footer-text strong { color: var(--text-dark); font-weight: 800; }

@keyframes heroIn {
  from { opacity: 0; transform: translateY(-12px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── 필터 칩 ── */
.filter-row { width: 100%; max-width: 520px; margin-bottom: 10px; }
.filter-label { font-size: 11px; font-weight: 700; color: var(--text-light); margin-bottom: 6px; }
.filter-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
.chip {
  flex-shrink: 0; border: 1.5px solid var(--border); background: var(--white);
  color: var(--text-mid); font-size: 12px; font-weight: 700;
  padding: 7px 14px; border-radius: 20px; cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: var(--accent); border-color: var(--accent); color: white; }

/* ── 검색바 ── */
.search-bar {
  width: 100%; max-width: 520px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
  background: var(--white); border: 1.5px solid var(--border); border-radius: 12px;
  padding: 10px 14px; box-shadow: var(--shadow-sm);
}
.search-bar input {
  flex: 1; border: none; outline: none; font-size: 13px; font-family: inherit;
  color: var(--text-dark); background: transparent;
}

/* ── 항목 리스트 ── */
.items-header {
  width: 100%; max-width: 520px; display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 8px;
}
.items-header h2 { font-size: 13px; font-weight: 800; color: var(--text-dark); }
.items-count { font-size: 11px; color: var(--text-light); }
.item-list { width: 100%; max-width: 520px; }
.items-loading, .items-empty {
  font-size: 13px; color: var(--text-light); text-align: center;
  padding: 40px 16px; background: var(--white); border-radius: var(--r);
  box-shadow: var(--shadow-sm);
}

.item-card {
  display: flex; gap: 12px; background: var(--white); border-radius: var(--r);
  box-shadow: var(--shadow-sm); padding: 12px; margin-bottom: 10px; cursor: pointer;
  transition: box-shadow .15s, transform .15s;
}
.item-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.photo-thumb {
  width: 64px; height: 64px; border-radius: 10px; object-fit: cover; flex-shrink: 0;
  background: var(--bg);
}
.photo-placeholder {
  display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.item-card-body { flex: 1; min-width: 0; }
.item-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.item-type-badge, .item-category-badge, .item-status-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
}
.item-type-badge.type-lost  { color: var(--type-lost-clr);  background: var(--type-lost-bg); }
.item-type-badge.type-found { color: var(--type-found-clr); background: var(--type-found-bg); }
.item-status-badge.status-open     { color: var(--status-open-clr);     background: var(--status-open-bg); }
.item-status-badge.status-resolved { color: var(--status-resolved-clr); background: var(--status-resolved-bg); }
.item-title { font-size: 14px; font-weight: 700; color: var(--text-dark); margin-bottom: 3px; }
.item-content {
  font-size: 12px; color: var(--text-mid); line-height: 1.5; margin-bottom: 5px;
  overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.item-meta { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }
.item-time { font-size: 10px; color: var(--text-light); }

/* ── 등록 버튼 ── */
.action-buttons {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  display: flex; gap: 10px; padding: 14px 16px; background: linear-gradient(to top, var(--bg) 60%, transparent);
}
.action-btn {
  flex: 1; max-width: 250px; margin: 0 auto; padding: 14px; border: none; border-radius: 14px;
  font-size: 14px; font-weight: 800; cursor: pointer; box-shadow: var(--shadow-md);
  transition: filter .15s;
}
.action-btn:hover { filter: brightness(1.06); }
.action-btn.btn-lost  { background: var(--type-lost-clr);  color: white; }
.action-btn.btn-found { background: var(--type-found-clr); color: white; }

/* ── 오버레이 공통 ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,18,36,.48); z-index: 400;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
@keyframes up { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.card-handle { width: 34px; height: 4px; background: #dde3ee; border-radius: 2px; margin: 0 auto 18px; }

.close-btn {
  position: absolute; top: 14px; right: 14px;
  background: var(--border); border: none; border-radius: 50%;
  width: 36px; height: 36px; font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-mid); transition: background .15s, color .15s;
  font-weight: 700;
}
.close-btn:hover { background: #c8ccda; color: var(--text-dark); }

/* ── 항목 상세 패널 ── */
.detail-panel {
  background: var(--white); border-radius: 20px 20px 0 0;
  padding: 20px 20px 24px; width: 100%; max-width: 520px;
  position: relative; max-height: 90vh; overflow-y: auto;
  animation: up .22s ease;
}
.detail-photo { width: 100%; max-height: 260px; object-fit: cover; border-radius: 14px; margin-bottom: 14px; }
.detail-badges { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.detail-title { font-size: 18px; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; }
.detail-content { font-size: 13px; color: var(--text-mid); line-height: 1.7; margin-bottom: 14px; white-space: pre-wrap; }
.detail-meta {
  background: var(--bg); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px;
  font-size: 12px; color: var(--text-mid); line-height: 1.8;
}
.detail-meta strong { color: var(--text-dark); }
.resolve-btn {
  width: 100%; padding: 13px; border: none; border-radius: 12px;
  background: var(--status-resolved-clr); color: white; font-size: 14px; font-weight: 700;
  cursor: pointer; margin-bottom: 18px; transition: filter .15s;
}
.resolve-btn:hover { filter: brightness(1.1); }
.resolved-note {
  text-align: center; font-size: 12px; color: var(--status-resolved-clr); font-weight: 700;
  margin-bottom: 18px; padding: 10px; background: var(--status-resolved-bg); border-radius: 10px;
}

/* ── 댓글 ── */
.comments-section { border-top: 1px solid var(--border); padding-top: 14px; }
.comments-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.comments-title { font-size: 13px; font-weight: 800; color: var(--text-dark); }
.comment-count { font-size: 11px; color: var(--text-light); }
.comments-loading, .comments-empty { font-size: 12px; color: var(--text-light); text-align: center; padding: 16px 0; }
.comment-item { background: var(--bg); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
.comment-author { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
.comment-text { font-size: 13px; color: var(--text-dark); line-height: 1.5; }
.comment-time { font-size: 10px; color: var(--text-light); margin-top: 4px; }

.comment-id-row { display: flex; gap: 6px; margin-top: 14px; }
.comment-id-row input {
  flex: 1; min-width: 0; padding: 8px 9px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 12px; font-family: inherit; outline: none;
}
.comment-id-row input:focus { border-color: var(--accent); }
.comment-input-row { display: flex; gap: 8px; margin-top: 8px; }
.comment-input-row input {
  flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: inherit; outline: none;
}
.comment-input-row input:focus { border-color: var(--accent); }
.comment-send-btn {
  padding: 0 18px; border: none; border-radius: 8px; background: var(--accent);
  color: white; font-size: 13px; font-weight: 700; cursor: pointer;
}
.comment-status { font-size: 11px; color: var(--text-light); margin-top: 6px; min-height: 14px; }

/* ── 등록 폼 패널 ── */
.form-panel {
  background: var(--white); border-radius: 20px 20px 0 0;
  padding: 20px 20px 36px; width: 100%; max-width: 520px;
  position: relative; max-height: 92vh; overflow-y: auto;
  animation: up .22s ease;
}
.form-panel h2 { font-size: 17px; font-weight: 800; margin-bottom: 18px; color: var(--text-dark); }
.form-field { margin-bottom: 14px; }
.form-field label {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; font-weight: 700; color: var(--text-light);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px;
}
.form-limit { font-size: 10px; font-weight: 400; color: var(--border); }
.form-row { display: flex; gap: 10px; }
.form-row .form-field { flex: 1; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 13px; font-family: inherit;
  color: var(--text-dark); background: white; outline: none;
  transition: border-color .15s;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--accent);
}
.form-field textarea { resize: none; line-height: 1.6; }
.photo-preview { margin-top: 8px; display: none; }
.photo-preview img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; }
.form-submit-btn {
  width: 100%; padding: 13px; border: none; border-radius: 12px;
  background: var(--accent); color: white; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: filter .15s; margin-top: 4px;
}
.form-submit-btn:hover:not(:disabled) { filter: brightness(1.1); }
.form-submit-btn:disabled { background: var(--border); color: var(--text-light); cursor: default; }
.form-status {
  text-align: center; font-size: 13px; margin-top: 10px;
  color: var(--text-mid); min-height: 20px;
}

@media (min-width: 480px) {
  .detail-panel, .form-panel { padding: 28px 28px 36px; }
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>

<div class="page">

  <!-- 브랜드 바 -->
  <div class="brand-bar">
    <div class="brand-logo">I</div>
    <div class="brand-name">Find<span>itium</span></div>
  </div>

  <!-- 히어로 배너 -->
  <div class="hero-banner">
    <div class="hero-eyebrow">우리 학교 · 분실물 게시판 <span class="by-initium">by Initium</span></div>
    <h1 class="hero-title">잃어버린 물건,<span class="hero-accent">바로 찾아보세요</span></h1>
    <p class="hero-desc">분실물과 발견물을 등록하고, 학번·이름·반으로 안전하게<br>주인을 찾아주는 우리 학교 분실물 게시판입니다.</p>
  </div>

  <!-- 유형 필터 -->
  <div class="filter-row">
    <div class="filter-label">유형</div>
    <div class="filter-chips" id="type-filter">
      <button class="chip active" data-type="all"   onclick="setTypeFilter('all')">전체</button>
      <button class="chip"        data-type="lost"  onclick="setTypeFilter('lost')">분실물</button>
      <button class="chip"        data-type="found" onclick="setTypeFilter('found')">발견물</button>
    </div>
  </div>

  <!-- 카테고리 필터 -->
  <div class="filter-row">
    <div class="filter-label">카테고리</div>
    <div class="filter-chips" id="category-filter">
      <button class="chip active" data-cat="all"      onclick="setCategoryFilter('all')">전체</button>
      <button class="chip"        data-cat="전자기기"   onclick="setCategoryFilter('전자기기')">전자기기</button>
      <button class="chip"        data-cat="지갑·카드"  onclick="setCategoryFilter('지갑·카드')">지갑·카드</button>
      <button class="chip"        data-cat="의류"       onclick="setCategoryFilter('의류')">의류</button>
      <button class="chip"        data-cat="학용품"     onclick="setCategoryFilter('학용품')">학용품</button>
      <button class="chip"        data-cat="도서"       onclick="setCategoryFilter('도서')">도서</button>
      <button class="chip"        data-cat="기타"       onclick="setCategoryFilter('기타')">기타</button>
    </div>
  </div>

  <!-- 검색바 -->
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="search-input" placeholder="제목, 내용으로 검색"
           oninput="onSearchInput(this.value)">
  </div>

  <!-- 항목 리스트 -->
  <div class="items-header">
    <h2>📋 등록된 물건</h2>
    <span class="items-count" id="items-count"></span>
  </div>
  <div class="item-list" id="item-list">
    <div class="items-loading">불러오는 중…</div>
  </div>

  <!-- 푸터 -->
  <div class="app-footer">
    <div class="footer-logo">I</div>
    <div class="footer-text">Made with <span>♥</span> by <strong>Initium</strong></div>
  </div>

</div><!-- /page -->

<!-- 등록 버튼 -->
<div class="action-buttons">
  <button class="action-btn btn-lost"  onclick="openReportForm('lost')">📦 분실물 등록</button>
  <button class="action-btn btn-found" onclick="openReportForm('found')">🙌 발견물 등록</button>
</div>

<!-- =========================================================
  항목 상세 오버레이
========================================================= -->
<div class="overlay" id="overlay-item" onclick="handleItemOverlayClick(event)">
  <div class="detail-panel" id="detail-panel">
    <div class="card-handle" aria-hidden="true"></div>
    <button class="close-btn" onclick="closeItem()">✕</button>
    <div id="detail-photo-wrap"></div>
    <div class="detail-badges" id="detail-badges"></div>
    <div class="detail-title" id="detail-title"></div>
    <div class="detail-content" id="detail-content"></div>
    <div class="detail-meta" id="detail-meta"></div>
    <div id="detail-resolve-area"></div>

    <div class="comments-section">
      <div class="comments-header">
        <div class="comments-title">💬 댓글 (연락하기)</div>
        <div class="comment-count" id="comment-count"></div>
      </div>
      <div id="comment-list"></div>

      <div class="comment-id-row">
        <input type="text" id="comment-studentid" placeholder="학번" maxlength="10">
        <input type="text" id="comment-name"      placeholder="이름" maxlength="10">
        <input type="text" id="comment-classname" placeholder="반"   maxlength="10">
      </div>
      <div class="comment-input-row">
        <input type="text" id="comment-text" placeholder="댓글을 남겨보세요 (예: 이거 제 물건 같아요!)" maxlength="150">
        <button class="comment-send-btn" onclick="submitComment()">등록</button>
      </div>
      <div class="comment-status" id="comment-status"></div>
    </div>
  </div>
</div>

<!-- =========================================================
  등록 폼 오버레이
========================================================= -->
<div class="overlay" id="overlay-report" onclick="handleReportOverlayClick(event)">
  <div class="form-panel" id="report-panel">
    <div class="card-handle" aria-hidden="true"></div>
    <button class="close-btn" onclick="closeReportForm()">✕</button>
    <h2 id="report-form-title">물건 등록하기 ✏️</h2>

    <div class="form-field">
      <label>카테고리</label>
      <select id="form-category">
        <option value="전자기기">전자기기</option>
        <option value="지갑·카드">지갑·카드</option>
        <option value="의류">의류</option>
        <option value="학용품">학용품</option>
        <option value="도서">도서</option>
        <option value="기타">기타</option>
      </select>
    </div>

    <div class="form-field">
      <label>제목 <span class="form-limit" id="cnt-title">0/30</span></label>
      <input type="text" id="form-title" maxlength="30" placeholder="한 줄로 요약해주세요"
             oninput="document.getElementById('cnt-title').textContent=this.value.length+'/30'">
    </div>

    <div class="form-field">
      <label>설명 <span class="form-limit" id="cnt-content">0/200</span></label>
      <textarea id="form-content" maxlength="200" rows="4"
                placeholder="물건의 특징을 자세히 적어주세요"
                oninput="document.getElementById('cnt-content').textContent=this.value.length+'/200'"></textarea>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label>장소</label>
        <input type="text" id="form-location" maxlength="30" placeholder="예: 도서관 2층, 교실, 운동장">
      </div>
      <div class="form-field">
        <label>날짜</label>
        <input type="date" id="form-date">
      </div>
    </div>

    <div class="form-field">
      <label>사진 <span class="form-limit" id="photo-required-label">선택</span></label>
      <input type="file" id="form-photo" accept="image/*" onchange="onPhotoSelected(event)">
      <div class="photo-preview" id="photo-preview"><img id="photo-preview-img" alt=""></div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label>학번</label>
        <input type="text" id="form-studentid" maxlength="10" placeholder="학번">
      </div>
      <div class="form-field">
        <label>이름</label>
        <input type="text" id="form-name" maxlength="10" placeholder="이름">
      </div>
      <div class="form-field">
        <label>반</label>
        <input type="text" id="form-classname" maxlength="10" placeholder="예: 2-3">
      </div>
    </div>

    <button class="form-submit-btn" id="form-submit-btn" onclick="submitReport()">등록하기</button>
    <div class="form-status" id="form-status"></div>
  </div>
</div>

<!-- =========================================================
  SCRIPTS
========================================================= -->
<script>
// ── Firebase 초기화 (findinitium 전용 프로젝트) ──
const firebaseConfig = {
  apiKey: "AIzaSyDwRRCR-XUqDTNZiCOLBpPyS0rGzzpxbwo",
  authDomain: "findinitium.firebaseapp.com",
  databaseURL: "https://findinitium-default-rtdb.firebaseio.com",
  projectId: "findinitium",
  storageBucket: "findinitium.firebasestorage.app",
  messagingSenderId: "703786885039",
  appId: "1:703786885039:web:1b8e087a6a5a5fef50595a"
};
const CATEGORY_META = {
  '전자기기':  { clr: '#2563eb', bg: '#dbeafe' },
  '지갑·카드': { clr: '#dc2626', bg: '#fee2e2' },
  '의류':      { clr: '#7c3aed', bg: '#ede9fe' },
  '학용품':    { clr: '#16a34a', bg: '#dcfce7' },
  '도서':      { clr: '#ca8a04', bg: '#fef9c3' },
  '기타':      { clr: '#64748b', bg: '#f1f5f9' },
};

let _allItems = [];
let _curItemId = null;
let _commentsListener = null;
let _commentsListenerItemId = null;
let _filterType = 'all';
let _filterCategory = 'all';
let _searchQuery = '';
let _reportType = null;
let _selectedPhotoFile = null;
let _searchDebounceTimer = null;

// 상태 변수들을 먼저 초기화한 뒤 Firebase를 연결한다 — CDN 로드 실패 등으로
// 아래 초기화가 실패해도 필터·오버레이 같은 UI 조작은 계속 동작하도록 함
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

/* ── 유틸 ── */
function _esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1)  return '방금 전';
  if (m < 60) return m + '분 전';
  const h = Math.floor(m / 60);
  if (h < 24) return h + '시간 전';
  return Math.floor(h / 24) + '일 전';
}

/* ── 저장된 신원 정보 (학번·이름·반) 기억하기 ── */
function loadSavedIdentity() {
  try {
    const raw = localStorage.getItem('lostfound_identity');
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function saveIdentity(studentId, name, className) {
  try {
    localStorage.setItem('lostfound_identity', JSON.stringify({ studentId, name, className }));
  } catch (e) {}
}
function fillIdentityFields(idPrefix) {
  const saved = loadSavedIdentity();
  if (!saved) return;
  const sEl = document.getElementById(idPrefix + 'studentid');
  const nEl = document.getElementById(idPrefix + 'name');
  const cEl = document.getElementById(idPrefix + 'classname');
  if (sEl && !sEl.value) sEl.value = saved.studentId || '';
  if (nEl && !nEl.value) nEl.value = saved.name || '';
  if (cEl && !cEl.value) cEl.value = saved.className || '';
}

/* ── 항목 목록 ── */
function loadItems() {
  db.ref('lostfound/items').orderByChild('timestamp').on('value', snap => {
    const items = [];
    snap.forEach(c => items.push({ id: c.key, ...c.val() }));
    items.reverse();
    _allItems = items;
    renderItemList();
  });
}

function setTypeFilter(type) {
  _filterType = type;
  document.querySelectorAll('#type-filter .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.type === type);
  });
  renderItemList();
}

function setCategoryFilter(cat) {
  _filterCategory = cat;
  document.querySelectorAll('#category-filter .chip').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });
  renderItemList();
}

function onSearchInput(value) {
  clearTimeout(_searchDebounceTimer);
  _searchDebounceTimer = setTimeout(() => {
    _searchQuery = value.trim().toLowerCase();
    renderItemList();
  }, 150);
}

function renderItemList() {
  const filtered = _allItems.filter(item => {
    if (_filterType !== 'all' && item.type !== _filterType) return false;
    if (_filterCategory !== 'all' && item.category !== _filterCategory) return false;
    if (_searchQuery) {
      const text = ((item.title || '') + ' ' + (item.content || '')).toLowerCase();
      if (!text.includes(_searchQuery)) return false;
    }
    return true;
  });

  const listEl  = document.getElementById('item-list');
  const countEl = document.getElementById('items-count');
  countEl.textContent = filtered.length ? filtered.length + '건' : '';

  if (!filtered.length) {
    const msg = _allItems.length
      ? '조건에 맞는 결과가 없어요.'
      : '아직 등록된 분실물·발견물이 없어요. 첫 번째로 등록해보세요!';
    listEl.innerHTML = `<div class="items-empty">${msg}</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(renderItemCard).join('');
}

function statusLabel(item) {
  if (item.status === 'resolved') return '해결됨';
  return item.type === 'lost' ? '찾는 중' : '주인을 찾는 중';
}

function renderItemCard(item) {
  const typeLabel = item.type === 'lost' ? '분실물' : '발견물';
  const typeClass = item.type === 'lost' ? 'type-lost' : 'type-found';
  const cat = CATEGORY_META[item.category] || CATEGORY_META['기타'];
  const statusClass = item.status === 'resolved' ? 'status-resolved' : 'status-open';
  const photoHtml = item.photoURL
    ? `<img class="photo-thumb" src="${_esc(item.photoURL)}" alt="">`
    : `<div class="photo-thumb photo-placeholder">📦</div>`;
  const locationText = _esc(item.location) + (item.locationDetail ? ' · ' + _esc(item.locationDetail) : '');

  return `
    <div class="item-card" onclick="openItem('${item.id}')">
      ${photoHtml}
      <div class="item-card-body">
        <div class="item-card-header">
          <span class="item-type-badge ${typeClass}">${typeLabel}</span>
          <span class="item-category-badge" style="color:${cat.clr};background:${cat.bg}">${_esc(item.category)}</span>
          <span class="item-status-badge ${statusClass}">${statusLabel(item)}</span>
        </div>
        <div class="item-title">${_esc(item.title)}</div>
        <div class="item-content">${_esc(item.content)}</div>
        <div class="item-meta">${locationText} · ${_esc(item.date)}</div>
        <div class="item-time">${timeAgo(item.timestamp)}</div>
      </div>
    </div>`;
}

/* ── 항목 상세 ── */
function openItem(itemId) {
  const item = _allItems.find(i => i.id === itemId);
  if (!item) return;
  _curItemId = itemId;

  const typeLabel = item.type === 'lost' ? '분실물' : '발견물';
  const typeClass = item.type === 'lost' ? 'type-lost' : 'type-found';
  const cat = CATEGORY_META[item.category] || CATEGORY_META['기타'];
  const statusClass = item.status === 'resolved' ? 'status-resolved' : 'status-open';

  document.getElementById('detail-photo-wrap').innerHTML = item.photoURL
    ? `<img class="detail-photo" src="${_esc(item.photoURL)}" alt="">`
    : '';

  document.getElementById('detail-badges').innerHTML = `
    <span class="item-type-badge ${typeClass}">${typeLabel}</span>
    <span class="item-category-badge" style="color:${cat.clr};background:${cat.bg}">${_esc(item.category)}</span>
    <span class="item-status-badge ${statusClass}">${statusLabel(item)}</span>`;

  document.getElementById('detail-title').textContent = item.title || '';
  document.getElementById('detail-content').textContent = item.content || '';

  const locationText = _esc(item.location) + (item.locationDetail ? ' · ' + _esc(item.locationDetail) : '');
  document.getElementById('detail-meta').innerHTML = `
    <div><strong>장소</strong> ${locationText}</div>
    <div><strong>날짜</strong> ${_esc(item.date)}</div>
    <div><strong>작성자</strong> ${_esc(item.className)} ${_esc(item.name)} (${_esc(item.studentId)})</div>`;

  renderResolveArea(item);
  loadComments(itemId);

  document.getElementById('overlay-item').classList.add('open');
}

function renderResolveArea(item) {
  const area = document.getElementById('detail-resolve-area');
  if (item.status === 'resolved') {
    area.innerHTML = `<div class="resolved-note">✅ 이미 해결된 항목입니다</div>`;
    return;
  }
  const label = item.type === 'lost' ? '찾았어요! 해결 처리' : '주인에게 전달했어요! 해결 처리';
  area.innerHTML = `<button class="resolve-btn" onclick="resolveItem('${item.id}')">${label}</button>`;
}

function resolveItem(itemId) {
  if (!confirm('이 물건을 찾으셨나요? 해결됨으로 표시할게요.')) return;
  db.ref('lostfound/items/' + itemId).update({
    status: 'resolved',
    resolvedAt: Date.now()
  }).then(() => {
    document.getElementById('detail-resolve-area').innerHTML =
      `<div class="resolved-note">✅ 해결 처리되었습니다</div>`;
  }).catch(() => {
    alert('처리 중 오류가 발생했어요. 다시 시도해주세요.');
  });
}

function closeItem() {
  document.getElementById('overlay-item').classList.remove('open');
  if (_commentsListener && _commentsListenerItemId) {
    db.ref('lostfound/comments/' + _commentsListenerItemId).off('value', _commentsListener);
    _commentsListener = null;
    _commentsListenerItemId = null;
  }
  _curItemId = null;
}

function handleItemOverlayClick(e) {
  if (e.target === document.getElementById('overlay-item')) closeItem();
}

/* ── 댓글 ── */
function loadComments(itemId) {
  if (_commentsListener && _commentsListenerItemId) {
    db.ref('lostfound/comments/' + _commentsListenerItemId).off('value', _commentsListener);
    _commentsListener = null;
  }
  document.getElementById('comment-list').innerHTML = '<div class="comments-loading">불러오는 중…</div>';
  document.getElementById('comment-status').textContent = '';
  fillIdentityFields('comment-');

  _commentsListenerItemId = itemId;
  _commentsListener = db.ref('lostfound/comments/' + itemId)
    .orderByChild('timestamp')
    .on('value', snap => {
      const items = [];
      snap.forEach(c => items.push({ id: c.key, ...c.val() }));
      items.reverse();
      renderComments(items);
    });
}

function renderComments(items) {
  const listEl  = document.getElementById('comment-list');
  const countEl = document.getElementById('comment-count');
  countEl.textContent = items.length ? items.length + '개' : '';

  if (!items.length) {
    listEl.innerHTML = '<div class="comments-empty">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</div>';
    return;
  }

  listEl.innerHTML = items.map(c => `
    <div class="comment-item">
      <div class="comment-author">${_esc(c.className)} ${_esc(c.name)} (${_esc(c.studentId)})</div>
      <div class="comment-text">${_esc(c.text)}</div>
      <div class="comment-time">${timeAgo(c.timestamp)}</div>
    </div>`).join('');
}

function submitComment() {
  if (!_curItemId) return;
  const studentId  = document.getElementById('comment-studentid').value.trim();
  const name       = document.getElementById('comment-name').value.trim();
  const className  = document.getElementById('comment-classname').value.trim();
  const text       = document.getElementById('comment-text').value.trim();
  const statusEl   = document.getElementById('comment-status');

  if (!studentId)  { statusEl.textContent = '학번을 입력해주세요.'; return; }
  if (!name)       { statusEl.textContent = '이름을 입력해주세요.'; return; }
  if (!className)  { statusEl.textContent = '반을 입력해주세요.'; return; }
  if (!text)       { statusEl.textContent = '댓글 내용을 입력해주세요.'; return; }

  statusEl.textContent = '';
  db.ref('lostfound/comments/' + _curItemId).push({
    studentId, name, className, text,
    timestamp: Date.now()
  }).then(() => {
    saveIdentity(studentId, name, className);
    document.getElementById('comment-text').value = '';
  }).catch(() => {
    statusEl.textContent = '오류가 발생했어요. 다시 시도해주세요.';
  });
}

/* ── 등록 폼 ── */
function openReportForm(type) {
  _reportType = type;
  resetReportForm();
  document.getElementById('form-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('report-form-title').textContent =
    type === 'lost' ? '분실물 등록하기 ✏️' : '발견물 등록하기 ✏️';
  document.getElementById('photo-required-label').textContent = type === 'found' ? '필수' : '선택';
  fillIdentityFields('form-');
  document.getElementById('overlay-report').classList.add('open');
}

function closeReportForm() {
  document.getElementById('overlay-report').classList.remove('open');
}

function handleReportOverlayClick(e) {
  if (e.target === document.getElementById('overlay-report')) closeReportForm();
}

function resetReportForm() {
  document.getElementById('form-title').value = '';
  document.getElementById('form-content').value = '';
  document.getElementById('form-location').value = '';
  document.getElementById('form-photo').value = '';
  document.getElementById('cnt-title').textContent = '0/30';
  document.getElementById('cnt-content').textContent = '0/200';
  document.getElementById('photo-preview').style.display = 'none';
  _selectedPhotoFile = null;
  const statusEl = document.getElementById('form-status');
  statusEl.textContent = '';
}

function onPhotoSelected(e) {
  const file = e.target.files[0];
  if (!file) { _selectedPhotoFile = null; document.getElementById('photo-preview').style.display = 'none'; return; }
  if (!file.type.startsWith('image/')) {
    alert('이미지 파일만 업로드할 수 있어요.');
    e.target.value = '';
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    alert('사진 용량은 5MB 이하로 올려주세요.');
    e.target.value = '';
    return;
  }
  _selectedPhotoFile = file;
  const previewWrap = document.getElementById('photo-preview');
  const previewImg  = document.getElementById('photo-preview-img');
  previewImg.src = URL.createObjectURL(file);
  previewWrap.style.display = 'block';
}

function submitReport() {
  const category        = document.getElementById('form-category').value;
  const title            = document.getElementById('form-title').value.trim();
  const content          = document.getElementById('form-content').value.trim();
  const location         = document.getElementById('form-location').value.trim();
  const date             = document.getElementById('form-date').value;
  const studentId        = document.getElementById('form-studentid').value.trim();
  const name             = document.getElementById('form-name').value.trim();
  const className        = document.getElementById('form-classname').value.trim();
  const statusEl         = document.getElementById('form-status');
  const btnEl            = document.getElementById('form-submit-btn');

  if (!title)      { statusEl.textContent = '제목을 입력해주세요.'; return; }
  if (!content)    { statusEl.textContent = '설명을 입력해주세요.'; return; }
  if (!location)   { statusEl.textContent = '장소를 입력해주세요.'; return; }
  if (!date)       { statusEl.textContent = '날짜를 입력해주세요.'; return; }
  if (_reportType === 'found' && !_selectedPhotoFile) { statusEl.textContent = '발견물은 사진을 등록해주세요.'; return; }
  if (!studentId)  { statusEl.textContent = '학번을 입력해주세요.'; return; }
  if (!name)       { statusEl.textContent = '이름을 입력해주세요.'; return; }
  if (!className)  { statusEl.textContent = '반을 입력해주세요.'; return; }

  btnEl.disabled = true;
  btnEl.textContent = '등록 중…';
  statusEl.textContent = '';

  const data = {
    type: _reportType,
    category, title, content,
    location, date,
    studentId, name, className,
    status: 'open',
    timestamp: Date.now()
  };

  const newRef = db.ref('lostfound/items').push();

  function finish(photoURL) {
    if (photoURL) data.photoURL = photoURL;
    newRef.set(data).then(() => {
      saveIdentity(studentId, name, className);
      statusEl.textContent = '✅ 등록되었습니다!';
      setTimeout(() => {
        closeReportForm();
        resetReportForm();
        btnEl.disabled = false;
        btnEl.textContent = '등록하기';
      }, 1200);
    }).catch(() => {
      statusEl.textContent = '오류가 발생했어요. 다시 시도해주세요.';
      btnEl.disabled = false;
      btnEl.textContent = '등록하기';
    });
  }

  if (_selectedPhotoFile) {
    const ext = (_selectedPhotoFile.name.split('.').pop() || 'jpg').toLowerCase();
    storage.ref('lostfound_photos/' + newRef.key + '.' + ext)
      .put(_selectedPhotoFile)
      .then(snap => snap.ref.getDownloadURL())
      .then(url => finish(url))
      .catch(() => finish(null));
  } else {
    finish(null);
  }
}

/* ── 전역 키보드/초기화 ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeItem(); closeReportForm(); }
});

loadItems();
</script>
</body>
