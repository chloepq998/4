<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이니티움 실시간 구현소 — 오늘의 갤러리</title>
<link rel="stylesheet" href="gallery.css">
</head>
<body>
  <header class="topbar">
    <span class="brand-emoji">⚡</span>
    <div>
      <h1>이니티움 실시간 구현소</h1>
      <p>아이디어만 가져오세요. 이니티움이 구현합니다.</p>
    </div>
  </header>

  <main class="stage">
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="phone-statusbar">
          <span id="status-time">9:41</span>
          <span>📶 🔋</span>
        </div>

        <section id="home-screen" class="home-screen">
          <div class="home-header">
            <h2>오늘의 구현소</h2>
            <p id="app-count-label">앱 0개 설치됨</p>
          </div>
          <div id="icon-grid" class="icon-grid"></div>
          <p id="empty-msg" class="empty-msg">첫 아이디어가 도착하면<br>여기에 앱이 설치됩니다</p>
        </section>

        <section id="app-view" class="app-view hidden">
          <div class="app-view-header">
            <button id="btn-back">‹ 홈</button>
            <span id="app-view-title">앱 이름</span>
          </div>
          <div id="app-view-body" class="app-view-body"></div>
        </section>

        <div class="home-indicator"></div>
      </div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="gallery.js"></script>
</body>
</html>
